<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Inventaire Véhicules</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1C1F22" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Inventaire" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; background:#F5F3EE; font-family:'Inter',sans-serif; color:#1C1F22; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }
  input:focus, textarea:focus, button:focus-visible { outline: 2px solid #C8372E; outline-offset: 2px; }

  header { background:#1C1F22; border-bottom:3px solid #C8372E; position:sticky; top:0; z-index:10; }
  .header-inner { max-width:880px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; }
  .brand-row { display:flex; align-items:center; gap:12px; }
  .brand-mark { width:10px; height:28px; background:#C8372E; }
  .brand-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; letter-spacing:0.04em; color:#F5F3EE; margin:0; line-height:1; }
  .brand-sub { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.12em; color:#8A8F94; margin:4px 0 0; }
  .icon-btn { background:transparent; border:1px solid #3A3F45; color:#F5F3EE; border-radius:4px; padding:8px; display:flex; }

  main { max-width:880px; margin:0 auto; padding:28px 20px 60px; }
  .center-box { display:flex; flex-direction:column; align-items:center; gap:10px; padding:60px 0; }
  .muted { color:#8A8F94; font-size:14px; }
  .err-banner { display:flex; align-items:center; gap:8px; background:#FBEAE8; color:#C8372E; padding:10px 14px; border-radius:4px; font-size:13px; margin-bottom:16px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
  .card { position:relative; text-align:left; background:#fff; border:1px solid #E4E0D6; border-radius:4px; padding:18px 16px 16px; overflow:hidden; width:100%; }
  .card-flag { position:absolute; top:10px; right:-34px; transform:rotate(45deg); width:140px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; letter-spacing:0.06em; color:#fff; padding:3px 0; }
  .card-body { display:flex; flex-direction:column; gap:4px; padding-right:10px; }
  .card-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; margin:6px 0 0; }
  .card-type { font-family:'JetBrains Mono',monospace; font-size:11px; color:#5B6770; margin:0; text-transform:uppercase; }
  .card-meta { font-size:12px; color:#8A8F94; margin:8px 0 0; }

  .page-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:32px; margin:4px 0 0; }
  .page-subtitle { color:#5B6770; font-size:14px; margin:4px 0 20px; }
  .back-link { display:flex; align-items:center; gap:4px; background:transparent; border:none; color:#5B6770; font-size:13px; padding:0; margin-bottom:14px; }
  .meta-line { font-size:13px; color:#5B6770; margin-bottom:6px; }
  .notes-box { font-size:13px; font-style:italic; color:#5B6770; background:#fff; border:1px solid #E4E0D6; border-radius:4px; padding:10px 12px; margin-bottom:14px; }

  .item-list { list-style:none; padding:0; margin:10px 0 24px; display:flex; flex-direction:column; gap:6px; }
  .group-header { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#5B6770; margin:16px 0 4px; }
  .group-header:first-child { margin-top:0; }
  .group-header-form { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:21px; letter-spacing:0.02em; text-transform:uppercase; color:#1C1F22; margin:24px 0 8px; padding-bottom:5px; border-bottom:2px solid #C8372E; }
  .group-header-form:first-child { margin-top:0; }
  .item-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:4px; }
  .item-name { flex:1; font-size:14px; }
  .item-status { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:0.04em; }

  .empty-box { display:flex; flex-direction:column; align-items:center; gap:8px; background:#fff; border:1px dashed #D8D3C6; border-radius:4px; padding:36px 0; margin-bottom:20px; }

  .btn-primary { display:inline-flex; align-items:center; gap:8px; background:#C8372E; color:#fff; border:none; border-radius:4px; padding:12px 20px; font-size:14px; font-weight:600; margin-top:8px; }
  .btn-primary:disabled { opacity:0.5; }
  .btn-secondary { display:inline-flex; align-items:center; gap:8px; background:#fff; color:#1C1F22; border:1px solid #D8D3C6; border-radius:4px; padding:12px 20px; font-size:14px; font-weight:600; }
  .btn-ghost { background:transparent; border:1px solid #D8D3C6; border-radius:4px; padding:8px 14px; font-size:13px; color:#5B6770; }

  label.field-label { display:block; font-size:12px; font-weight:600; color:#5B6770; margin-top:18px; margin-bottom:6px; }
  input.field, textarea.field { width:100%; border:1px solid #D8D3C6; border-radius:4px; padding:10px 12px; font-size:14px; background:#fff; }
  .field-err { color:#C8372E; font-size:12px; margin-top:4px; }

  .form-row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #E4E0D6; flex-wrap:wrap; }
  .form-item-name { font-size:14px; flex:1 1 200px; }
  .toggle-group { display:flex; gap:6px; flex-wrap:wrap; }
  .toggle-btn { border:1.5px solid; border-radius:4px; padding:6px 10px; font-size:12px; font-weight:600; background:#fff; }

  .config-card { background:#fff; border:1px solid #E4E0D6; border-radius:4px; padding:16px; margin-bottom:14px; }
  .config-card-head { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .input-inline { flex:1; min-width:120px; border:1px solid #D8D3C6; border-radius:4px; padding:8px 10px; font-size:14px; font-weight:600; }
  .input-inline-small { flex:1; border:1px solid #D8D3C6; border-radius:4px; padding:7px 10px; font-size:13px; }
  .config-item-row { display:flex; gap:8px; margin-bottom:6px; }
  .danger-btn { background:#FBEAE8; color:#C8372E; border:none; border-radius:4px; padding:0 10px; }
  .add-item-btn { display:inline-flex; align-items:center; gap:6px; background:transparent; border:1px dashed #D8D3C6; border-radius:4px; padding:6px 10px; font-size:12px; color:#5B6770; margin-top:4px; }
  .add-vehicle-btn { display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px dashed #D8D3C6; border-radius:4px; padding:10px 16px; font-size:13px; color:#5B6770; margin-bottom:24px; }
  .config-actions { display:flex; gap:10px; }

  .history-row { display:flex; justify-content:space-between; align-items:center; gap:10px; background:#fff; border:1px solid #E4E0D6; border-radius:4px; padding:12px 14px; margin-bottom:8px; cursor:pointer; }
  .history-row:hover { border-color:#C8372E; }
  .setup-box { background:#fff; border:1px solid #E4E0D6; border-radius:4px; padding:20px; line-height:1.6; font-size:14px; }
  .setup-box code { background:#F5F3EE; padding:2px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:12px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.9s linear infinite; display:block; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand-row">
      <div class="brand-mark"></div>
      <div>
        <h1 class="brand-title">INVENTAIRE VÉHICULES</h1>
        <p class="brand-sub">POSTE&nbsp;· CONTRÔLE MATÉRIEL</p>
      </div>
    </div>
    <button id="headerBtn" class="icon-btn">⚙</button>
  </div>
</header>
<main id="app"></main>

<script>
// =====================================================================
// CONFIGURATION — colle ici l'URL de ton Google Apps Script Web App
// (voir GUIDE-COMPLET.md)
// =====================================================================
const API_URL = "https://script.google.com/macros/s/AKfycbyjD_vbtkqP77Yi6i-oNn8yW06CaNvoTknJd8Q7I46QaCLfNs5AV2H1Ee2LoTtZs6lJnw/exec";

// ---------------------------------------------------------------------
// State
// ---------------------------------------------------------------------
let state = {
  config: null,
  history: [],
  view: "dashboard", // dashboard | detail | form | config | historyList | historyDetail
  selectedVehicleId: null,
  selectedEntryId: null,
  loading: true,
  error: null,
  isAdmin: false,
  adminPin: "",
};

const STATUS = {
  ok: { label: "OK", color: "#3A7D5C", bg: "#E7F1EB" },
  manquant: { label: "Manquant", color: "#C8372E", bg: "#FBEAE8" },
  endommage: { label: "Endommagé", color: "#E8A33D", bg: "#FCF1DF" },
};

const uid = () => Math.random().toString(36).slice(2, 9);

// Ensures older configs (free-text "group" field) still work: migrates any
// legacy text group into a real location entry the first time it's loaded.
function normalizeConfig(cfg) {
  cfg.vehicles.forEach((v) => {
    if (!v.groups) v.groups = [];
    if (typeof v.hidden !== "boolean") v.hidden = false;
    v.items.forEach((it) => {
      if (!it.groupId && it.group && it.group.trim()) {
        const name = it.group.trim();
        let g = v.groups.find((g) => g.name === name);
        if (!g) {
          g = { id: uid(), name };
          v.groups.push(g);
        }
        it.groupId = g.id;
      }
      delete it.group;
      if (!it.groupId) it.groupId = null;
    });
  });
  return cfg;
}

// Items in vehicle-defined location order; unassigned items appear first, unlabeled.
function groupItemsByLocation(vehicle) {
  const groups = vehicle.groups || [];
  const items = vehicle.items || [];
  const result = [];
  const ungrouped = items.filter((it) => !it.groupId || !groups.find((g) => g.id === it.groupId));
  if (ungrouped.length) result.push({ name: null, items: ungrouped });
  groups.forEach((g) => {
    const gItems = items.filter((it) => it.groupId === g.id);
    if (gItems.length) result.push({ name: g.name, items: gItems });
  });
  return result;
}

// ---------------------------------------------------------------------
// API helpers
// ---------------------------------------------------------------------
async function apiGet(action, params = {}) {
  const q = new URLSearchParams({ action, ...params });
  const res = await fetch(`${API_URL}?${q.toString()}`);
  if (!res.ok) throw new Error("Erreur réseau");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// Pour les envois volumineux (config, inventaire) : le corps de la requête
// n'a pas la limite de longueur d'une URL, contrairement à apiGet.
async function apiPost(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, ...payload }),
  });
  if (!res.ok) throw new Error("Erreur réseau");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadAll() {
  state.loading = true;
  state.error = null;
  render();
  try {
    const data = await apiGet("getData");
    state.config = normalizeConfig(data.config);
    state.history = data.history || [];
  } catch (e) {
    state.error = "Impossible de charger les données. Vérifie la configuration (voir GUIDE-COMPLET.md).";
  } finally {
    state.loading = false;
    render();
  }
}

async function checkAdmin(pin) {
  const data = await apiGet("checkAdmin", { pin });
  return !!data.ok;
}

async function requireAdmin() {
  if (state.isAdmin) return true;
  const pin = prompt("Code administrateur requis :");
  if (pin === null) return false;
  try {
    const ok = await checkAdmin(pin);
    if (ok) {
      state.isAdmin = true;
      state.adminPin = pin;
      return true;
    }
    alert("Code incorrect.");
    return false;
  } catch (e) {
    alert("Impossible de vérifier le code pour le moment.");
    return false;
  }
}

async function saveConfigRemote(cfg) {
  await apiPost("saveConfig", { config: cfg, pin: state.adminPin });
  state.config = cfg;
}

async function submitInventoryRemote(record) {
  const res = await apiPost("submitInventory", { record });
  state.history.push({ ...record, id: res.id });
}

async function deleteEntryRemote(id) {
  await apiPost("deleteEntry", { id, pin: state.adminPin });
  state.history = state.history.filter((h) => h.id !== id);
}

function latestFor(vehicleId) {
  const entries = state.history.filter((h) => h.vehicleId === vehicleId);
  if (!entries.length) return null;
  return entries.slice().sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
}

function historyFor(vehicleId) {
  return state.history
    .filter((h) => h.vehicleId === vehicleId)
    .slice()
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", year: "2-digit", hour: "2-digit", minute: "2-digit" });
}

function goto(view, vehicleId = null, entryId = null) {
  state.view = view;
  state.selectedVehicleId = vehicleId;
  state.selectedEntryId = entryId;
  window.scrollTo(0, 0);
  render();
}

// ---------------------------------------------------------------------
// Header button behavior
// ---------------------------------------------------------------------
document.getElementById("headerBtn").addEventListener("click", async () => {
  if (state.view === "config") {
    goto("dashboard");
    return;
  }
  const ok = await requireAdmin();
  if (ok) goto("config");
});

// ---------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------
function render() {
  const app = document.getElementById("app");

  if (!API_URL || API_URL.indexOf("COLLE_ICI") === 0) {
    app.innerHTML = `
      <div class="setup-box">
        <h2 class="page-title" style="font-size:24px;">Configuration requise</h2>
        <p>Cette application n'est pas encore connectée à sa base de données.</p>
        <p>Ouvre le fichier <code>index.html</code>, trouve la ligne :</p>
        <p><code>const API_URL = "COLLE_ICI_TON_URL_GOOGLE_APPS_SCRIPT";</code></p>
        <p>Et remplace-la par l'URL de ton Google Apps Script Web App (voir <code>GUIDE-COMPLET.md</code>).</p>
      </div>`;
    return;
  }

  if (state.loading) {
    app.innerHTML = `<div class="center-box"><svg class="spinner" width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="11" fill="none" stroke="#E4E0D6" stroke-width="3.5"/><circle cx="14" cy="14" r="11" fill="none" stroke="#C8372E" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="52" stroke-dashoffset="35"/></svg><p class="muted">Chargement…</p></div>`;
    return;
  }

  let html = "";
  if (state.error) {
    html += `<div class="err-banner">⚠ ${state.error}</div>`;
  }

  if (!state.config) {
    app.innerHTML = html;
    return;
  }

  if (state.view === "dashboard") html += renderDashboard();
  else if (state.view === "detail") html += renderDetail();
  else if (state.view === "form") html += renderForm();
  else if (state.view === "config") html += renderConfig();
  else if (state.view === "historyList") html += renderHistoryList();
  else if (state.view === "historyDetail") html += renderHistoryDetail();

  app.innerHTML = html;
  attachHandlers();
}

// ---------------------------------------------------------------------
// Dashboard
// ---------------------------------------------------------------------
function renderDashboard() {
  const cards = state.config.vehicles
    .filter((v) => !v.hidden)
    .map((v) => {
      const rec = latestFor(v.id);
      const problems = rec ? Object.values(rec.results).filter((s) => s !== "ok").length : null;
      const flagColor = !rec ? "#8A8F94" : problems === 0 ? "#3A7D5C" : "#C8372E";
      const flagLabel = !rec ? "NON VÉRIFIÉ" : problems === 0 ? "COMPLET" : `${problems} À SIGNALER`;
      return `
        <button class="card" data-action="detail" data-vehicle="${v.id}">
          <div class="card-flag" style="background:${flagColor}">${flagLabel}</div>
          <div class="card-body">
            <h2 class="card-title">${escapeHtml(v.name)}</h2>
            <p class="card-type">${escapeHtml(v.type)}</p>
            <p class="card-meta">${rec ? `Vérifié par ${escapeHtml(rec.checkedBy)} · ${formatDate(rec.timestamp)}` : "Jamais vérifié"}</p>
          </div>
        </button>`;
    })
    .join("");
  return `<div class="grid">${cards}</div>`;
}

// ---------------------------------------------------------------------
// Detail
// ---------------------------------------------------------------------
function renderDetail() {
  const v = state.config.vehicles.find((x) => x.id === state.selectedVehicleId);
  if (!v) return "";
  const rec = latestFor(v.id);
  const hist = historyFor(v.id);

  let body;
  if (rec) {
    const groups = groupItemsByLocation(v);
    const rows = groups
      .map((g) => {
        const header = g.name ? `<div class="group-header">${escapeHtml(g.name)}</div>` : "";
        const itemRows = g.items
          .map((it) => {
            const s = rec.results[it.id] || "ok";
            const meta = STATUS[s];
            return `<li class="item-row" style="background:${meta.bg}">
              <span style="color:${meta.color}">●</span>
              <span class="item-name">${escapeHtml(it.name)}</span>
              <span class="item-status" style="color:${meta.color}">${meta.label}</span>
            </li>`;
          })
          .join("");
        return header + itemRows;
      })
      .join("");
    body = `
      <p class="meta-line">Vérifié par <strong>${escapeHtml(rec.checkedBy)}</strong> le ${formatDate(rec.timestamp)}</p>
      ${rec.notes ? `<p class="notes-box">« ${escapeHtml(rec.notes)} »</p>` : ""}
      <ul class="item-list">${rows}</ul>`;
  } else {
    body = `<div class="empty-box"><p class="muted">Aucun inventaire enregistré pour ce véhicule.</p></div>`;
  }

  return `
    <button class="back-link" data-action="dashboard">← Tableau de bord</button>
    <h2 class="page-title">${escapeHtml(v.name)}</h2>
    <p class="page-subtitle">${escapeHtml(v.type)}</p>
    ${body}
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn-primary" data-action="form" data-vehicle="${v.id}">${rec ? "Refaire l'inventaire" : "Faire l'inventaire"}</button>
      ${hist.length ? `<button class="btn-secondary" data-action="historyList" data-vehicle="${v.id}">Historique (${hist.length})</button>` : ""}
    </div>`;
}

// ---------------------------------------------------------------------
// History list & detail
// ---------------------------------------------------------------------
function renderHistoryList() {
  const v = state.config.vehicles.find((x) => x.id === state.selectedVehicleId);
  const hist = historyFor(v.id);
  const rows = hist
    .map((h) => {
      const problems = Object.values(h.results).filter((s) => s !== "ok").length;
      return `<div class="history-row" data-action="historyDetail" data-vehicle="${v.id}" data-entry="${h.id}">
        <span>${formatDate(h.timestamp)} — ${escapeHtml(h.checkedBy)}</span>
        <span style="color:${problems ? "#C8372E" : "#3A7D5C"}; font-family:'JetBrains Mono',monospace; font-size:11px;">${problems ? problems + " à signaler" : "complet"}</span>
      </div>`;
    })
    .join("");
  return `
    <button class="back-link" data-action="detail" data-vehicle="${v.id}">← ${escapeHtml(v.name)}</button>
    <h2 class="page-title">Historique</h2>
    <p class="page-subtitle">${escapeHtml(v.name)} — ${hist.length} inventaire(s)</p>
    ${rows}`;
}

function renderHistoryDetail() {
  const v = state.config.vehicles.find((x) => x.id === state.selectedVehicleId);
  const entry = state.history.find((h) => h.id === state.selectedEntryId);
  if (!entry) return "";
  const groups = groupItemsByLocation(v);
  const rows = groups
    .map((g) => {
      const header = g.name ? `<div class="group-header">${escapeHtml(g.name)}</div>` : "";
      const itemRows = g.items
        .map((it) => {
          const s = entry.results[it.id] || "ok";
          const meta = STATUS[s];
          return `<li class="item-row" style="background:${meta.bg}">
            <span style="color:${meta.color}">●</span>
            <span class="item-name">${escapeHtml(it.name)}</span>
            <span class="item-status" style="color:${meta.color}">${meta.label}</span>
          </li>`;
        })
        .join("");
      return header + itemRows;
    })
    .join("");
  return `
    <button class="back-link" data-action="historyList" data-vehicle="${v.id}">← Historique</button>
    <h2 class="page-title">${escapeHtml(v.name)}</h2>
    <p class="meta-line">Vérifié par <strong>${escapeHtml(entry.checkedBy)}</strong> le ${formatDate(entry.timestamp)}</p>
    ${entry.notes ? `<p class="notes-box">« ${escapeHtml(entry.notes)} »</p>` : ""}
    <ul class="item-list">${rows}</ul>
    ${state.isAdmin ? `<button class="btn-secondary" data-action="deleteEntry" data-entry="${entry.id}" data-vehicle="${v.id}" style="color:#C8372E; border-color:#C8372E;">Supprimer cette entrée</button>` : ""}`;
}

// ---------------------------------------------------------------------
// Form
// ---------------------------------------------------------------------
let formDraft = { checkedBy: "", results: {}, notes: "", step: 0, touched: false, saving: false };

function renderForm() {
  const v = state.config.vehicles.find((x) => x.id === state.selectedVehicleId);
  if (!v) return "";
  if (state._formVehicleId !== v.id) {
    formDraft = { checkedBy: "", results: {}, notes: "", step: 0, touched: false, saving: false };
    state._formVehicleId = v.id;
  }

  const groups = groupItemsByLocation(v);
  const step = Math.min(formDraft.step, groups.length - 1);
  const current = groups[step];
  const isLast = step === groups.length - 1;
  const stepAnswered = current.items.every((it) => formDraft.results[it.id]);
  const nameOk = formDraft.checkedBy.trim().length > 0;

  const nameField =
    step === 0
      ? `
    <label class="field-label">Contrôlé par</label>
    <input class="field" id="checkedByInput" placeholder="Ton nom" value="${escapeHtml(formDraft.checkedBy)}" />
    ${formDraft.touched && !nameOk ? `<p class="field-err">Indique ton nom avant de commencer.</p>` : ""}`
      : "";

  const itemsHtml = current.items
    .map((it) => {
      const btns = Object.entries(STATUS)
        .map(([key, meta]) => {
          const active = formDraft.results[it.id] === key;
          return `<button class="toggle-btn" data-action="setStatus" data-item="${it.id}" data-status="${key}"
            style="border-color:${meta.color}; background:${active ? meta.color : "#fff"}; color:${active ? "#fff" : meta.color};">
            ${meta.label}</button>`;
        })
        .join("");
      return `<div class="form-row"><span class="form-item-name">${escapeHtml(it.name)}</span><div class="toggle-group">${btns}</div></div>`;
    })
    .join("");

  const notesField = isLast
    ? `
    <label class="field-label">Remarques générales (optionnel)</label>
    <textarea class="field" id="notesInput" rows="3" placeholder="Détails utiles : emplacement, état, action à prévoir…">${escapeHtml(formDraft.notes)}</textarea>`
    : "";

  const backBtn =
    step > 0
      ? `<button class="btn-secondary" data-action="prevStep">← Lieu précédent</button>`
      : "";

  return `
    <button class="back-link" data-action="detail" data-vehicle="${v.id}">← Annuler</button>
    <h2 class="page-title">${escapeHtml(v.name)}</h2>
    <p class="page-subtitle" style="font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.06em;">LIEU ${step + 1} / ${groups.length}</p>

    ${nameField}

    <div class="group-header-form">${current.name ? escapeHtml(current.name) : "Équipements divers"}</div>
    ${itemsHtml}
    ${formDraft.touched && !stepAnswered ? `<p class="field-err">Renseigne le statut de chaque équipement de ce lieu.</p>` : ""}

    ${notesField}

    <div style="display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;">
      ${backBtn}
      <button class="btn-primary" id="validateStepBtn" ${formDraft.saving ? "disabled" : ""}>
        ${formDraft.saving ? "Enregistrement…" : isLast ? "Enregistrer l'inventaire" : "Valider ce lieu →"}
      </button>
    </div>`;
}

// ---------------------------------------------------------------------
// Config
// ---------------------------------------------------------------------
let configDraft = null;
let configDirty = false;
let configCollapsed = null;

function renderConfig() {
  if (!configDraft) configDraft = JSON.parse(JSON.stringify(state.config));
  if (!configCollapsed) configCollapsed = new Set(configDraft.vehicles.map((v) => v.id));

  const vehicleCards = configDraft.vehicles
    .map((v, index) => {
      const isFirst = index === 0;
      const isLast = index === configDraft.vehicles.length - 1;
      const collapsed = configCollapsed.has(v.id);
      const groupOptions = (g) =>
        `<option value="">Aucun lieu</option>` +
        v.groups
          .map((grp) => `<option value="${grp.id}" ${g === grp.id ? "selected" : ""}>${escapeHtml(grp.name)}</option>`)
          .join("");

      const groupsList = v.groups
        .map(
          (g, gi) => `<div class="config-item-row">
            <button class="btn-ghost" data-action="moveGroupUp" data-vehicle="${v.id}" data-group="${g.id}" ${gi === 0 ? "disabled" : ""} title="Monter">↑</button>
            <button class="btn-ghost" data-action="moveGroupDown" data-vehicle="${v.id}" data-group="${g.id}" ${gi === v.groups.length - 1 ? "disabled" : ""} title="Descendre">↓</button>
            <input class="input-inline-small" data-role="groupName" data-vehicle="${v.id}" data-group="${g.id}" value="${escapeHtml(g.name)}" placeholder="Nom du lieu" />
            <button class="danger-btn" data-action="removeGroup" data-vehicle="${v.id}" data-group="${g.id}">✕</button>
          </div>`
        )
        .join("");

      const items = v.items
        .map(
          (it) => `<div class="config-item-row">
            <input class="input-inline-small" data-role="itemName" data-vehicle="${v.id}" data-item="${it.id}" value="${escapeHtml(it.name)}" placeholder="Nom de l'équipement" />
            <select class="input-inline-small" data-role="itemGroupSelect" data-vehicle="${v.id}" data-item="${it.id}" style="max-width:170px; color:#5B6770;">
              ${groupOptions(it.groupId)}
            </select>
            <button class="danger-btn" data-action="removeItem" data-vehicle="${v.id}" data-item="${it.id}">✕</button>
          </div>`
        )
        .join("");
      return `<div class="config-card" style="${v.hidden ? "opacity:0.55;" : ""}">
        <div class="config-card-head">
          <button class="btn-ghost" data-action="toggleCollapse" data-vehicle="${v.id}" title="${collapsed ? "Déplier" : "Replier"}">${collapsed ? "▸" : "▾"}</button>
          <button class="btn-ghost" data-action="moveVehicleUp" data-vehicle="${v.id}" ${isFirst ? "disabled" : ""} title="Monter">↑</button>
          <button class="btn-ghost" data-action="moveVehicleDown" data-vehicle="${v.id}" ${isLast ? "disabled" : ""} title="Descendre">↓</button>
          <input class="input-inline" data-role="vehicleName" data-vehicle="${v.id}" value="${escapeHtml(v.name)}" placeholder="Nom du véhicule" />
          <input class="input-inline" data-role="vehicleType" data-vehicle="${v.id}" value="${escapeHtml(v.type)}" placeholder="Type / mission" style="color:#5B6770;" />
          <button class="btn-ghost" data-action="duplicateVehicle" data-vehicle="${v.id}" title="Dupliquer ce véhicule">⧉ Dupliquer</button>
          <button class="danger-btn" data-action="removeVehicle" data-vehicle="${v.id}">🗑</button>
        </div>

        <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:#5B6770; margin-bottom:10px;">
          <input type="checkbox" data-role="vehicleHidden" data-vehicle="${v.id}" ${v.hidden ? "checked" : ""} />
          Indisponible — masquer ce véhicule du tableau de bord
        </label>

        ${collapsed ? `<p class="muted" style="font-size:12px; margin:0;">${v.items.length} équipement(s) · ${v.groups.length} lieu(x)</p>` : `
        <p style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#5B6770; margin:12px 0 6px;">Lieux dans ce véhicule</p>
        ${groupsList}
        <button class="add-item-btn" data-action="addGroup" data-vehicle="${v.id}">+ Ajouter un lieu</button>

        <p style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#5B6770; margin:16px 0 6px;">Équipements</p>
        ${items}
        <button class="add-item-btn" data-action="addItem" data-vehicle="${v.id}">+ Ajouter un équipement</button>
        `}
      </div>`;
    })
    .join("");

  return `
    <h2 class="page-title">Configuration</h2>
    <p class="page-subtitle">Véhicules et équipements suivis par l'application</p>
    <div style="display:flex; gap:10px; margin-bottom:16px;">
      <button class="btn-ghost" data-action="expandAll">Tout déplier</button>
      <button class="btn-ghost" data-action="collapseAll">Tout replier</button>
    </div>
    ${vehicleCards}
    <button class="add-vehicle-btn" data-action="addVehicle">+ Ajouter un véhicule</button>
    <div class="config-actions">
      <button class="btn-secondary" data-action="dashboard">Retour</button>
      <button class="btn-primary" id="saveConfigBtn" ${configDirty ? "" : "disabled"}>Enregistrer les modifications</button>
    </div>`;
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ---------------------------------------------------------------------
// Event delegation
// ---------------------------------------------------------------------
function attachHandlers() {
  const app = document.getElementById("app");

  app.querySelectorAll("[data-action]").forEach((el) => {
    el.addEventListener("click", async (e) => {
      const action = el.dataset.action;
      const vehicleId = el.dataset.vehicle;
      const itemId = el.dataset.item;
      const entryId = el.dataset.entry;

      if (action === "dashboard") goto("dashboard");
      else if (action === "detail") goto("detail", vehicleId);
      else if (action === "form") goto("form", vehicleId);
      else if (action === "config") { configDraft = null; configDirty = false; goto("config"); }
      else if (action === "historyList") {
        const ok = await requireAdmin();
        if (ok) goto("historyList", vehicleId);
      }
      else if (action === "historyDetail") {
        const ok = await requireAdmin();
        if (ok) goto("historyDetail", vehicleId, entryId);
      }
      else if (action === "deleteEntry") {
        if (confirm("Supprimer définitivement cette entrée de l'historique ?")) {
          await deleteEntryRemote(entryId);
          goto("historyList", vehicleId);
        }
      }
      else if (action === "setStatus") {
        formDraft.results[itemId] = el.dataset.status;
        render();
      }
      else if (action === "prevStep") {
        formDraft.step = Math.max(0, formDraft.step - 1);
        formDraft.touched = false;
        render();
      }
      else if (action === "toggleCollapse") {
        if (configCollapsed.has(vehicleId)) configCollapsed.delete(vehicleId);
        else configCollapsed.add(vehicleId);
        render();
      }
      else if (action === "expandAll") {
        configCollapsed.clear();
        render();
      }
      else if (action === "collapseAll") {
        configDraft.vehicles.forEach((v) => configCollapsed.add(v.id));
        render();
      }
      else if (action === "addVehicle") {
        configDraft.vehicles.push({ id: uid(), name: "Nouveau véhicule", type: "", groups: [], items: [], hidden: false });
        configDirty = true;
        render();
      }
      else if (action === "removeVehicle") {
        configDraft.vehicles = configDraft.vehicles.filter((v) => v.id !== vehicleId);
        configDirty = true;
        render();
      }
      else if (action === "duplicateVehicle") {
        const original = configDraft.vehicles.find((v) => v.id === vehicleId);
        const groupIdMap = new Map();
        const newGroups = original.groups.map((g) => {
          const newId = uid();
          groupIdMap.set(g.id, newId);
          return { id: newId, name: g.name };
        });
        const newItems = original.items.map((it) => ({
          id: uid(),
          name: it.name,
          groupId: it.groupId ? groupIdMap.get(it.groupId) || null : null,
        }));
        const copy = {
          id: uid(),
          name: original.name + " (copie)",
          type: original.type,
          hidden: original.hidden,
          groups: newGroups,
          items: newItems,
        };
        const i = configDraft.vehicles.findIndex((v) => v.id === vehicleId);
        configDraft.vehicles.splice(i + 1, 0, copy);
        configDirty = true;
        render();
      }
      else if (action === "moveVehicleUp") {
        const i = configDraft.vehicles.findIndex((v) => v.id === vehicleId);
        if (i > 0) {
          [configDraft.vehicles[i - 1], configDraft.vehicles[i]] = [configDraft.vehicles[i], configDraft.vehicles[i - 1]];
          configDirty = true;
          render();
        }
      }
      else if (action === "moveVehicleDown") {
        const i = configDraft.vehicles.findIndex((v) => v.id === vehicleId);
        if (i < configDraft.vehicles.length - 1) {
          [configDraft.vehicles[i + 1], configDraft.vehicles[i]] = [configDraft.vehicles[i], configDraft.vehicles[i + 1]];
          configDirty = true;
          render();
        }
      }
      else if (action === "addItem") {
        configDraft.vehicles.find((v) => v.id === vehicleId).items.push({ id: uid(), name: "", groupId: null });
        configDirty = true;
        render();
      }
      else if (action === "removeItem") {
        const v = configDraft.vehicles.find((v) => v.id === vehicleId);
        v.items = v.items.filter((i) => i.id !== itemId);
        configDirty = true;
        render();
      }
      else if (action === "addGroup") {
        configDraft.vehicles.find((v) => v.id === vehicleId).groups.push({ id: uid(), name: "Nouveau lieu" });
        configDirty = true;
        render();
      }
      else if (action === "removeGroup") {
        const v = configDraft.vehicles.find((v) => v.id === vehicleId);
        const groupId = el.dataset.group;
        v.groups = v.groups.filter((g) => g.id !== groupId);
        v.items.forEach((it) => { if (it.groupId === groupId) it.groupId = null; });
        configDirty = true;
        render();
      }
      else if (action === "moveGroupUp") {
        const v = configDraft.vehicles.find((v) => v.id === vehicleId);
        const groupId = el.dataset.group;
        const i = v.groups.findIndex((g) => g.id === groupId);
        if (i > 0) {
          [v.groups[i - 1], v.groups[i]] = [v.groups[i], v.groups[i - 1]];
          configDirty = true;
          render();
        }
      }
      else if (action === "moveGroupDown") {
        const v = configDraft.vehicles.find((v) => v.id === vehicleId);
        const groupId = el.dataset.group;
        const i = v.groups.findIndex((g) => g.id === groupId);
        if (i < v.groups.length - 1) {
          [v.groups[i + 1], v.groups[i]] = [v.groups[i], v.groups[i + 1]];
          configDirty = true;
          render();
        }
      }
    });
  });

  const checkedByInput = document.getElementById("checkedByInput");
  if (checkedByInput) {
    checkedByInput.addEventListener("input", (e) => { formDraft.checkedBy = e.target.value; });
  }
  const notesInput = document.getElementById("notesInput");
  if (notesInput) {
    notesInput.addEventListener("input", (e) => { formDraft.notes = e.target.value; });
  }
  const validateStepBtn = document.getElementById("validateStepBtn");
  if (validateStepBtn) {
    validateStepBtn.addEventListener("click", async () => {
      const v = state.config.vehicles.find((x) => x.id === state.selectedVehicleId);
      const groups = groupItemsByLocation(v);
      const step = Math.min(formDraft.step, groups.length - 1);
      const current = groups[step];
      const isLast = step === groups.length - 1;

      formDraft.touched = true;
      const stepAnswered = current.items.every((it) => formDraft.results[it.id]);
      const nameOk = formDraft.checkedBy.trim().length > 0;
      if (!nameOk || !stepAnswered) { render(); return; }

      if (!isLast) {
        formDraft.step += 1;
        formDraft.touched = false;
        render();
        return;
      }

      formDraft.saving = true;
      render();
      try {
        await submitInventoryRemote({
          vehicleId: v.id,
          checkedBy: formDraft.checkedBy.trim(),
          timestamp: new Date().toISOString(),
          results: formDraft.results,
          notes: formDraft.notes.trim(),
        });
        goto("detail", v.id);
      } catch (e) {
        state.error = "L'enregistrement a échoué : " + e.message;
        formDraft.saving = false;
        render();
      }
    });
  }

  app.querySelectorAll('[data-role="vehicleName"]').forEach((el) =>
    el.addEventListener("input", (e) => { configDraft.vehicles.find((v) => v.id === el.dataset.vehicle).name = e.target.value; configDirty = true; })
  );
  app.querySelectorAll('[data-role="vehicleType"]').forEach((el) =>
    el.addEventListener("input", (e) => { configDraft.vehicles.find((v) => v.id === el.dataset.vehicle).type = e.target.value; configDirty = true; })
  );
  app.querySelectorAll('[data-role="vehicleHidden"]').forEach((el) =>
    el.addEventListener("change", (e) => { configDraft.vehicles.find((v) => v.id === el.dataset.vehicle).hidden = e.target.checked; configDirty = true; render(); })
  );
  app.querySelectorAll('[data-role="itemName"]').forEach((el) =>
    el.addEventListener("input", (e) => {
      const v = configDraft.vehicles.find((v) => v.id === el.dataset.vehicle);
      v.items.find((i) => i.id === el.dataset.item).name = e.target.value;
      configDirty = true;
    })
  );
  app.querySelectorAll('[data-role="itemGroupSelect"]').forEach((el) =>
    el.addEventListener("change", (e) => {
      const v = configDraft.vehicles.find((v) => v.id === el.dataset.vehicle);
      v.items.find((i) => i.id === el.dataset.item).groupId = e.target.value || null;
      configDirty = true;
    })
  );
  app.querySelectorAll('[data-role="groupName"]').forEach((el) =>
    el.addEventListener("input", (e) => {
      const v = configDraft.vehicles.find((v) => v.id === el.dataset.vehicle);
      v.groups.find((g) => g.id === el.dataset.group).name = e.target.value;
      configDirty = true;
    })
  );

  const saveConfigBtn = document.getElementById("saveConfigBtn");
  if (saveConfigBtn) {
    saveConfigBtn.addEventListener("click", async () => {
      saveConfigBtn.disabled = true;
      saveConfigBtn.textContent = "Enregistrement…";
      try {
        await saveConfigRemote(configDraft);
        configDirty = false;
        goto("dashboard");
      } catch (e) {
        state.error = "Échec de l'enregistrement de la configuration : " + e.message;
        saveConfigBtn.disabled = false;
        saveConfigBtn.textContent = "Enregistrer les modifications";
        render();
      }
    });
  }
}

// ---------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------
loadAll();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {
      // installation reste possible sans service worker, simplement sans mise en cache
    });
  });
}
</script>
